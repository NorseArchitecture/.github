name: Setup .NET
description: Checks out the repository, configures .NET 11, and registers the NorseArchitecture NuGet feed.

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: "11.0.x"
        dotnet-quality: "preview"

    - name: Add Norse NuGet source
      shell: bash
      run: dotnet nuget add source "https://nuget.pkg.github.com/NorseArchitecture/index.json" --name github

    - name: Restore
      shell: bash
      run: dotnet restore
