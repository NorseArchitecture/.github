name: NuGet Release

# Setup steps (checkout, .NET, NuGet source, restore) are intentionally inline.
# Composite actions cannot be called from within a reusable workflow — the runner
# checks out the CALLER's repository, so any ./ path resolves there, not here.
# env: defined here does not flow into reusable workflow jobs (build-test); each
# reusable workflow carries its own env block.

on:
  workflow_call:

permissions:
  contents: write
  packages: write
  security-events: write
  pull-requests: write

env:
  DOTNET_VERSION: "11.0.x"
  DOTNET_QUALITY: "preview"

jobs:
  build-test:
    uses: ./.github/workflows/ci-build-test.yml

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}

      - name: Add Norse NuGet source
        run: dotnet nuget add source "https://nuget.pkg.github.com/NorseArchitecture/index.json" --name github

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Build
        run: |
          dotnet restore
          dotnet build -c Release

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  pack-and-publish:
    needs: [build-test, codeql]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}

      - name: Add Norse NuGet source
        run: dotnet nuget add source "https://nuget.pkg.github.com/NorseArchitecture/index.json" --name github

      - name: Pack
        run: dotnet pack -c Release -o ./artifacts/nupkg

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Push to GitHub Packages
        run: dotnet nuget push "./artifacts/nupkg/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/NorseArchitecture/index.json" --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            ./artifacts/nupkg/*.nupkg \
            ./sbom.cyclonedx.json \
            --generate-notes
