name: NuGet Release

on:
  workflow_call:

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  build-test:
    uses: ./.github/workflows/ci-build-test.yml

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "11.0.x"
          dotnet-quality: "preview"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Add Norse NuGet source
        uses: NorseArchitecture/.github/.github/actions/add-norse-nuget-source@master

      - name: Restore and build
        run: |
          dotnet restore
          dotnet build --no-restore -c Release

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  pack-and-publish:
    needs: [build-test, codeql]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "11.0.x"
          dotnet-quality: "preview"

      - name: Add Norse NuGet source
        uses: NorseArchitecture/.github/.github/actions/add-norse-nuget-source@master

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: dotnet pack -c Release -o ./artifacts/nupkg

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Push to GitHub Packages
        run: dotnet nuget push "./artifacts/nupkg/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/NorseArchitecture/index.json" --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            ./artifacts/nupkg/*.nupkg \
            ./sbom.cyclonedx.json \
            --generate-notes
