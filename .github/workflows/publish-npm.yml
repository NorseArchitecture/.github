name: Publish npm

# build-test and codeql are no longer called from inside this workflow — see the
# same comment in publish-nuget.yml for why.

on:
  workflow_call:

permissions:
  packages: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@norsearchitecture'

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-npm.cyclonedx.json

      - name: Pack
        run: npm pack

      - name: Publish to GitHub Packages
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm view "$PKG_NAME@$PKG_VERSION" version --registry https://npm.pkg.github.com &>/dev/null; then
            echo "Version $PKG_VERSION of $PKG_NAME already published, skipping."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: npm-artifacts
          path: |
            ./*.tgz
            ./sbom-npm.cyclonedx.json
          retention-days: 7
