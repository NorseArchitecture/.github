name: Publish Container

# Setup steps (checkout, .NET, NuGet source) are intentionally inline.
# Composite actions cannot be called from within a reusable workflow — the runner
# checks out the CALLER's repository, so any ./ path resolves there, not here.
#
# ci and codeql are no longer called from inside this workflow — see the same
# comment in publish-nuget.yml for why.
#
# The four images build/scan/push in parallel via a matrix, not sequentially in
# one job — wall-clock over runner-minutes is the deliberate trade here. Each
# matrix leg uploads its own artifact bundle (container-<name>-artifacts), which
# still matches create-release.yml's `*-artifacts` download pattern unchanged.

on:
  workflow_call:

permissions:
  packages: write

env:
  DOTNET_VERSION: "11.0.x"
  DOTNET_QUALITY: "preview"

jobs:
  publish-container:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: migrations
            project: src/Hosting.Migrations.Service/Hosting.Migrations.Service.csproj
            repository: norsearchitecture/hosting/migrations
          - name: web
            project: src/Hosting.Web.Server/Hosting.Web.Server.csproj
            repository: norsearchitecture/hosting/web
          - name: worker
            project: src/Hosting.Worker/Hosting.Worker.csproj
            repository: norsearchitecture/hosting/worker
          - name: stories
            project: src/Hosting.Stories.Server/Hosting.Stories.Server.csproj
            repository: norsearchitecture/hosting/stories
    env:
      NUGET_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish ${{ matrix.name }} image (local daemon)
        run: |
          dotnet publish ${{ matrix.project }} \
            --os linux --arch x64 -c Release /t:PublishContainer \
            /p:ContainerRepository=${{ matrix.repository }} \
            /p:ContainerImageTag=${{ steps.version.outputs.value }}

      - name: Scan ${{ matrix.name }} image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.repository }}:${{ steps.version.outputs.value }}
          format: cyclonedx
          output: sbom-${{ matrix.name }}.cdx.json
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: Push ${{ matrix.name }} image
        run: |
          docker tag ${{ matrix.repository }}:${{ steps.version.outputs.value }} \
            ghcr.io/${{ matrix.repository }}:${{ steps.version.outputs.value }}
          docker push ghcr.io/${{ matrix.repository }}:${{ steps.version.outputs.value }}

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: container-${{ matrix.name }}-artifacts
          path: sbom-${{ matrix.name }}.cdx.json
          retention-days: 7
